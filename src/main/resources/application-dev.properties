# Dev: load trove data from fixtures/data (run from project root). No S3 bucket.
moocho.bucket.name=
moocho.data.location=file:./fixtures/data/*.json

# Dev: embedded H2 unless SPRING_DATASOURCE_URL overrides. DDL from Flyway (db/migration/h2+postgres); DevDataSeeder inserts dev user/token when profile dev is active.
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:h2:mem:morsor}
spring.datasource.driver-class-name=${SPRING_DATASOURCE_DRIVER_CLASS_NAME:org.h2.Driver}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:sa}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:}
# DDL via Flyway only (see application.properties / db/migration/h2+postgres).
spring.sql.init.mode=never

# Dev: hardwired credentials and API token (seeded into H2 on startup).
app.dev.username=dev
app.dev.password=dev
app.dev.api-token=dev-token
