# Dev: load trove data from fixtures/data (run from project root). No S3 bucket.
moocho.bucket.name=
moocho.data.location=file:./fixtures/data/*.json

# Dev: embedded H2 (override main datasource). DDL from Flyway (db/migration/h2+postgres); DevDataSeeder only inserts dev user/token.
spring.datasource.url=jdbc:h2:mem:morsor
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
# DDL via Flyway only (see application.properties / db/migration/h2+postgres).
spring.sql.init.mode=never

# Dev: hardwired credentials and API token (seeded into H2 on startup).
app.dev.username=dev
app.dev.password=dev
app.dev.api-token=dev-token
