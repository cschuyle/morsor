# Dev: load trove data from fixtures/data (file:./fixtures/data/*.json when run from project root). No S3 bucket.
moocho.bucket.name=

# Dev: embedded H2 (override main datasource). Tables created by DevDataSeeder.
spring.datasource.url=jdbc:h2:mem:morsor
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
# Do not run schema.sql in dev (it uses PostgreSQL TIMESTAMPTZ; H2 uses TIMESTAMP). DevDataSeeder creates tables.
spring.sql.init.mode=never

# Dev: hardwired credentials and API token (seeded into H2 on startup).
app.dev.username=dev
app.dev.password=dev
app.dev.api-token=dev-token
