# Profile postgres: use PostgreSQL instead of the dev H2 datasource.
# Override any value below with env vars as needed.

spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/morsor}
spring.datasource.driver-class-name=${SPRING_DATASOURCE_DRIVER_CLASS_NAME:org.postgresql.Driver}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:morsor}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:morsor}

# Keep DDL managed by Flyway (same migration set as other profiles).
spring.sql.init.mode=never
