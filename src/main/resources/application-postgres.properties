# Postgres profile: use Postgres for auth (no H2), no dev seeding. For S3-backed troves use s3troves (e.g. postgres,s3troves).
# Run: SPRING_PROFILES_ACTIVE=postgres SPRING_DATASOURCE_PASSWORD=morsor ./gradlew bootRun
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/morsor}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:morsor}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:}
# Same Flyway scripts as dev (classpath:db/migration/h2+postgres from application.properties).
# Baseline if the DB already has tables but no flyway_schema_history (existing installs).
spring.flyway.baseline-on-migrate=true
spring.flyway.baseline-version=1
