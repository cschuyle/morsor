# Profiles: dev (default: classpath troves + seeded dev user/token on H2), s3troves (S3 troves), no-auth (no form login).
# Database: set spring.datasource.url (e.g. SPRING_DATASOURCE_URL) to H2 or PostgreSQL; driver is inferred from the JDBC URL.
spring.profiles.active=dev
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:h2:mem:morsor}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:sa}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:}
# Schema: Flyway (db/migration/h2+postgres — SQL compatible with H2 and PostgreSQL). Do not use spring.sql.init for DDL.
spring.sql.init.mode=never
spring.flyway.locations=classpath:db/migration/h2+postgres
# Existing DBs that already have tables but no flyway_schema_history (e.g. legacy manual schema).
spring.flyway.baseline-on-migrate=true
spring.flyway.baseline-version=1

# Where to load trove JSON from when not using S3. Override via MOOCHO_DATA_LOCATION.
moocho.data.location=${MOOCHO_DATA_LOCATION:file:./fixtures/data/*.json}

# Optional: comma-delimited trove IDs to load (e.g. little-prince,synology-bu-courses). Empty = load all.
moocho.only.trove.ids=${MOOCHO_INCLUDE_TROVE_IDS:}
# Optional: comma-delimited trove IDs to exclude. Excluded IDs are never loaded, even if included above.
moocho.exclude.trove.ids=${MOOCHO_EXCLUDE_TROVE_IDS:}

# Search/duplicates/uniques result cache: TTL in minutes, max memory in bytes. Override via MOOCHO_CACHE_TTL_MINUTES, MOOCHO_CACHE_MAX_BYTES.
moocho.cache.ttl-minutes=${MOOCHO_CACHE_TTL_MINUTES:720}
moocho.cache.max-bytes=${MOOCHO_CACHE_MAX_BYTES:1073741824}

# Login session timeout (Spring Boot duration; default 12h). Override via MOOCHO_SESSION_TIMEOUT.
server.servlet.session.timeout=${MOOCHO_SESSION_TIMEOUT:12h}

# Async request timeout (ms) for long-running streaming (e.g. duplicates/uniques). Override via MOOCHO_ASYNC_TIMEOUT_MS. Default 10 min.
spring.mvc.async.request-timeout=${MOOCHO_ASYNC_TIMEOUT_MS:600000}

# Expose only health for security
management.endpoints.web.exposure.include=health
management.endpoint.health.show-details=when-authorized

# Log request mappings at startup (see which URLs are registered) and each request
logging.level.org.springframework.web.servlet.mvc.method.annotation.RequestMappingHandlerMapping=INFO
logging.level.org.springframework.web.servlet.DispatcherServlet=DEBUG
logging.level.com.example.morsor=INFO
