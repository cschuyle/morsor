# Active profile: dev (classpath data) or prod (S3). Default is dev; set SPRING_PROFILES_ACTIVE=prod for production.
spring.profiles.active=dev

# Heroku sets PORT; use it when present so the app listens on the dyno port.
server.port=${PORT:8080}

# Optional: comma-delimited trove IDs to load (e.g. little-prince,synology-bu-courses). Empty = load all.
moocho.only.trove.ids=${MOOCHO_ONLY_TROVE_IDS:}

# Expose only health for security
management.endpoints.web.exposure.include=health
management.endpoint.health.show-details=when-authorized

# Log request mappings at startup (see which URLs are registered) and each request
logging.level.org.springframework.web.servlet.mvc.method.annotation.RequestMappingHandlerMapping=INFO
logging.level.org.springframework.web.servlet.DispatcherServlet=DEBUG
logging.level.com.example.morsor=INFO
